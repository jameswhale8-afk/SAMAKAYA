name: samakaya
description: "SamaKaya - My Sister. Community app for foreign domestic workers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.2.4
  firebase_core: ^3.12.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  local_auth: ^2.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  connectivity_plus: ^7.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
    - assets/animations/