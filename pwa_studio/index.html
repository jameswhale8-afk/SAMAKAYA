<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pageant Studio - KayaKita</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf8f5;color:#333;padding:20px;max-width:500px;margin:0 auto}
  h1{font-size:28px;color:#D4A017;text-align:center;margin:20px 0 8px}
  .sub{text-align:center;color:#999;font-size:14px;margin-bottom:24px}
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);cursor:pointer}
  .card-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:60px}
  .card-name{padding:12px;text-align:center;font-weight:600;font-size:14px;color:#444}
  .btn{width:100%;padding:16px;background:#FF0080;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;margin:24px 0;cursor:pointer}
  .btn:disabled{background:#ccc}
  .watermark{position:fixed;bottom:0;left:0;right:0;padding:8px;background:rgba(0,0,0,0.8);color:white;text-align:center;font-size:12px;display:none}
</style>
</head>
<body>
  <h1>👑 Pageant Studio</h1>
  <p class="sub">Take a photo, become a queen. Share with your sisters.</p>
  <div class="gallery" id="gallery"></div>
  <button class="btn" id="btn" onclick="swap()">📸 Take Photo & Swap</button>
  <div class="watermark" id="wm">👑 KayaKita Pageant Queen</div>
  <script>
    const crowns = ["👑","🌺","🌟","🌙","✨","💎","🌸","🦋","🌊","🔥","🍀","🌅"];
    const names = ["Golden Queen","Tropical Queen","Star Queen","Moon Queen","Diamond Queen","Pearl Queen","Cherry Blossom","Butterfly Queen","Ocean Queen","Fire Queen","Lucky Queen","Sunset Queen"];
    const g = document.getElementById('gallery');
    for(let i=0;i<12;i++){
      const c = document.createElement('div');
      c.className='card';
      c.innerHTML='<div class="card-img" style="background:linear-gradient(135deg,'+['#FFD700','#FF6B9D','#40E0D0','#FF69B4','#DDA0DD','#FFA07A','#98FB98','#87CEEB','#F0E68C','#FFB6C1','#20B2AA','#FF7F50'][i]+',white)">'+crowns[i]+'</div><div class="card-name">'+names[i]+'</div>';
      g.appendChild(c);
    }
    let swaps = 3;
    const btn = document.getElementById('btn');
    const wm = document.getElementById('wm');
    function swap(){
      if(swaps>0){
        swaps--;
        btn.textContent = '📸 Take Photo & Swap ('+swaps+' left today)';
        wm.style.display = 'block';
        setTimeout(()=>{ wm.style.display = 'none'; }, 2000);
        if(swaps===0) btn.disabled = true;
      }
    }
    if(localStorage.getItem('swaps')) swaps = parseInt(localStorage.getItem('swaps'));
    else localStorage.setItem('swaps','3');
    btn.textContent = '📸 Take Photo & Swap ('+swaps+' left today)';
    if(swaps===0) btn.disabled = true;
    // Reset at midnight
    setInterval(()=>{
      const h = new Date().getHours();
      if(h===0){ localStorage.setItem('swaps','3'); location.reload(); }
    }, 3600000);
  </script>
</body>
</html>
